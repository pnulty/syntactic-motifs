<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntactic Motifs Explorer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.5;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 500;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .controls label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .controls select {
            padding: 0.4rem 0.8rem;
            font-size: 0.95rem;
            border: none;
            border-radius: 4px;
            background: white;
            cursor: pointer;
        }

        .author-info {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-left: auto;
        }

        .container {
            display: flex;
            height: calc(100vh - 60px);
        }

        .pattern-list {
            width: 55%;
            overflow-y: auto;
            background: white;
            border-right: 1px solid #ddd;
        }

        .pattern-section {
            padding: 1rem;
        }

        .pattern-section h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #eee;
        }

        .pattern-header {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #999;
            padding: 0.4rem 0.8rem;
            border-bottom: 1px solid #eee;
            margin-bottom: 0.25rem;
        }

        .pattern-header .col-pmi { min-width: 4rem; }
        .pattern-header .col-pattern { flex: 1; }
        .pattern-header .col-count { min-width: 3rem; text-align: right; }

        .pattern-section.overused h2 {
            color: #27ae60;
        }

        .pattern-section.underused h2 {
            color: #e74c3c;
        }

        .pattern-item {
            padding: 0.6rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            font-size: 0.9rem;
            transition: background 0.15s;
        }

        .pattern-item:hover {
            background: #f0f0f0;
        }

        .pattern-item.selected {
            background: #e8f4fd;
        }

        .pattern-pmi {
            font-weight: 600;
            min-width: 4rem;
            font-variant-numeric: tabular-nums;
        }

        .pattern-pmi.positive {
            color: #27ae60;
        }

        .pattern-pmi.negative {
            color: #e74c3c;
        }

        .pattern-text {
            font-family: "SF Mono", "Consolas", monospace;
            font-size: 0.82rem;
            color: #555;
            flex: 1;
        }

        .pattern-count {
            color: #999;
            font-size: 0.8rem;
            min-width: 3rem;
            text-align: right;
        }

        .examples-panel {
            width: 45%;
            overflow-y: auto;
            padding: 1.5rem;
            background: #fafafa;
        }

        .examples-panel h2 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .examples-panel .pattern-display {
            font-family: "SF Mono", "Consolas", monospace;
            font-size: 0.9rem;
            background: #2c3e50;
            color: #ecf0f1;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #666;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #999;
        }

        .stat-value {
            font-weight: 600;
            color: #333;
        }

        .example-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .example-item {
            background: white;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        .example-sentence {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .example-sentence mark {
            background: #fff3cd;
            padding: 0.1em 0.2em;
            border-radius: 2px;
        }

        .example-meta {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #888;
            font-style: italic;
        }

        .placeholder {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 3rem;
        }

        .toggle-buttons {
            display: flex;
            gap: 0.5rem;
            margin-left: 1rem;
        }

        .toggle-btn {
            padding: 0.3rem 0.8rem;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.15s;
        }

        .toggle-btn:hover {
            opacity: 1;
        }

        .toggle-btn.active {
            background: rgba(255,255,255,0.2);
            opacity: 1;
        }
    </style>
</head>
<body>
    <header>
        <h1>Syntactic Motifs Explorer</h1>
        <div class="controls">
            <label for="author-select">Author:</label>
            <select id="author-select">
                <option value="">Loading...</option>
            </select>
            <div class="toggle-buttons">
                <button class="toggle-btn active" data-view="overused">Overused</button>
                <button class="toggle-btn" data-view="underused">Underused</button>
                <button class="toggle-btn" data-view="both">Both</button>
            </div>
        </div>
        <div class="author-info" id="author-info"></div>
    </header>

    <div class="container">
        <div class="pattern-list" id="pattern-list">
            <div class="placeholder">Select an author to view their distinctive patterns</div>
        </div>

        <div class="examples-panel" id="examples-panel">
            <div class="placeholder">Click a pattern to see examples</div>
        </div>
    </div>

    <script>
        let data = null;
        let currentAuthor = null;
        let currentView = 'overused';
        let selectedPattern = null;

        async function loadData() {
            try {
                const response = await fetch('explorer_data.json');
                data = await response.json();
                populateAuthorSelect();
            } catch (e) {
                document.getElementById('pattern-list').innerHTML =
                    '<div class="placeholder">Error loading data. Run generate_explorer_data.py first.</div>';
            }
        }

        function populateAuthorSelect() {
            const select = document.getElementById('author-select');
            select.innerHTML = '<option value="">Select an author...</option>';
            data.authors.forEach(author => {
                const opt = document.createElement('option');
                opt.value = author.author;
                opt.textContent = `${author.author} (${author.sentences.toLocaleString()} sentences)`;
                select.appendChild(opt);
            });
        }

        function selectAuthor(authorName) {
            currentAuthor = data.authors.find(a => a.author === authorName);
            if (!currentAuthor) {
                document.getElementById('pattern-list').innerHTML =
                    '<div class="placeholder">Select an author to view their distinctive patterns</div>';
                document.getElementById('author-info').textContent = '';
                return;
            }

            document.getElementById('author-info').textContent =
                `${currentAuthor.titles.length} works: ${currentAuthor.titles.slice(0, 3).join(', ')}${currentAuthor.titles.length > 3 ? '...' : ''}`;

            renderPatterns();
            selectedPattern = null;
            document.getElementById('examples-panel').innerHTML =
                '<div class="placeholder">Click a pattern to see examples</div>';
        }

        function renderPatterns() {
            if (!currentAuthor) return;

            const container = document.getElementById('pattern-list');
            let html = '';

            if (currentView === 'overused' || currentView === 'both') {
                html += renderPatternSection('overused', 'Overused Patterns (positive PMI)', currentAuthor.overused);
            }

            if (currentView === 'underused' || currentView === 'both') {
                html += renderPatternSection('underused', 'Underused Patterns (negative PMI)', currentAuthor.underused);
            }

            container.innerHTML = html;

            // Add click handlers
            container.querySelectorAll('.pattern-item').forEach(item => {
                item.addEventListener('click', () => {
                    container.querySelectorAll('.pattern-item').forEach(i => i.classList.remove('selected'));
                    item.classList.add('selected');
                    showExamples(item.dataset.pattern);
                });
            });
        }

        function renderPatternSection(type, title, patterns) {
            const limit = currentView === 'both' ? 25 : 40;
            const displayPatterns = patterns.slice(0, limit);

            let html = `<div class="pattern-section ${type}"><h2>${title}</h2>`;
            html += `
                <div class="pattern-header">
                    <span class="col-pmi">PMI</span>
                    <span class="col-pattern">Pattern</span>
                    <span class="col-count">Count</span>
                </div>
            `;

            displayPatterns.forEach(p => {
                const pmiClass = p.pmi >= 0 ? 'positive' : 'negative';
                const pmiStr = p.pmi >= 0 ? `+${p.pmi.toFixed(2)}` : p.pmi.toFixed(2);
                html += `
                    <div class="pattern-item" data-pattern="${encodeURIComponent(p.pattern)}">
                        <span class="pattern-pmi ${pmiClass}">${pmiStr}</span>
                        <span class="pattern-text">${escapeHtml(p.pattern)}</span>
                        <span class="pattern-count">${p.count}</span>
                    </div>
                `;
            });

            html += '</div>';
            return html;
        }

        function showExamples(encodedPattern) {
            const pattern = decodeURIComponent(encodedPattern);
            selectedPattern = pattern;

            // Find pattern in current author's data
            let patternData = currentAuthor.overused.find(p => p.pattern === pattern)
                || currentAuthor.underused.find(p => p.pattern === pattern);

            if (!patternData) {
                document.getElementById('examples-panel').innerHTML =
                    '<div class="placeholder">Pattern not found</div>';
                return;
            }

            const panel = document.getElementById('examples-panel');
            const ratio = patternData.ratio ? `${patternData.ratio}×` : '∞';

            let html = `
                <h2>Pattern</h2>
                <div class="pattern-display">${escapeHtml(pattern)}</div>

                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">PMI</span>
                        <span class="stat-value">${patternData.pmi >= 0 ? '+' : ''}${patternData.pmi.toFixed(3)}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Author freq</span>
                        <span class="stat-value">${patternData.author_freq.toFixed(4)}/sent</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Baseline freq</span>
                        <span class="stat-value">${patternData.baseline_freq.toFixed(4)}/sent</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Ratio</span>
                        <span class="stat-value">${ratio}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Count</span>
                        <span class="stat-value">${patternData.count}</span>
                    </div>
                </div>

                <h2>Examples</h2>
                <div class="example-list">
            `;

            if (patternData.examples.length === 0) {
                html += '<div class="placeholder">No examples collected</div>';
            } else {
                patternData.examples.forEach(ex => {
                    const highlighted = highlightWords(ex.sentence, ex.words);
                    html += `
                        <div class="example-item">
                            <div class="example-sentence">${highlighted}</div>
                            <div class="example-meta">— ${escapeHtml(ex.title)}</div>
                        </div>
                    `;
                });
            }

            html += '</div>';
            panel.innerHTML = html;
        }

        function highlightWords(sentence, words) {
            // Try to find and highlight the words in the sentence
            const escaped = escapeHtml(sentence);
            const wordList = words.split(/\s+/);

            if (wordList.length === 0) return escaped;

            // Build a regex to find the word sequence
            const pattern = wordList.map(w =>
                w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
            ).join('[\\s,;:\'"]*');

            const regex = new RegExp(`(${pattern})`, 'i');
            return escaped.replace(regex, '<mark>$1</mark>');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        document.getElementById('author-select').addEventListener('change', (e) => {
            selectAuthor(e.target.value);
        });

        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                renderPatterns();
            });
        });

        // Load data on page load
        loadData();
    </script>
</body>
</html>
